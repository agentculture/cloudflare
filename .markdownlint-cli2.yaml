# markdownlint-cli2 config for cfafi.
# markdownlint-cli2 stops walking at the git root, so the user's global
# ~/.markdownlint-cli2.yaml isn't picked up from inside the repo.
# Keep this file aligned with the global preset.

config:
  default: true
  # MD013: Line length — disabled. Prose lines wrap at the reader.
  MD013: false
  # MD060: Table pipe spacing — disabled (stylistic preference).
  MD060: false
  # MD024: Duplicate headings — allow under different parents so Keep a
  # Changelog entries can each have ### Added / ### Changed / ### Fixed.
  MD024:
    siblings_only: true

ignores:
  - "node_modules/**"
  - ".local/**"
  - ".git/**"
  # cf-purge-manifests/ is operational scratch: manifests are machine-
  # generated (GFM task-list format) and never committed. Without this
  # ignore, a stale manifest on disk breaks local `bash tests/markdownlint.sh`
  # runs even though CI never sees the file (it's gitignored).
  - ".cf-purge-manifests/**"
