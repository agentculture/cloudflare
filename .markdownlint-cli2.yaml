# markdownlint-cli2 config for the cfafi repo.
# Mirrors the workspace's global ~/.markdownlint-cli2.yaml so clones get
# identical behaviour without depending on per-machine setup.

config:
  default: true
  # MD013: Line length — disabled (too noisy for docs/skills with prose).
  MD013: false
  # MD060: Table pipe spacing — stylistic, disabled in global config.
  MD060: false

ignores:
  - "node_modules/**"
  - ".local/**"
  - ".git/**"
  # cf-purge-manifests/ is operational scratch: manifests are machine-
  # generated (GFM task-list format) and never committed. Without this
  # ignore, a stale manifest on disk breaks local `bash tests/markdownlint.sh`
  # runs even though CI never sees the file (it's gitignored).
  - ".cf-purge-manifests/**"
